version: '3.8'

services:

  # ─── Databases ─────────────────────────────────────────────

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ratings_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Discovery Server (must start first) ───────────────────

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── Microservices ─────────────────────────────────────────

  ratings-data-service:
    build: ./ratings-data-service
    container_name: ratings-data-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ratings_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  movie-info-service:
    build: ./movie-info-service
    container_name: movie-info-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

 
  trending-movies-service:
    build: ./trending-movies-service
    container_name: trending-movies-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      RATINGS_SERVICE_URL: http://ratings-data-service:8083
      MOVIE_INFO_SERVICE_URL: http://movie-info-service:8082
    depends_on:
      discovery-server:
        condition: service_healthy
      ratings-data-service:
        condition: service_started
      movie-info-service:
        condition: service_started

  movie-catalog-service:
    build: ./movie-catalog-service
    container_name: movie-catalog-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_REDIS_HOST: redis
      SPRING_APPLICATION_JSON: '{"grpc.client.trending-movies-service.address":"dns:///trending-movies-service:9090"}'
    depends_on:
      discovery-server:
        condition: service_healthy
      trending-movies-service:
        condition: service_started


# ─── Volumes ───────────────────────────────────────────────

volumes:
  mysql_data:
  mongo_data:
